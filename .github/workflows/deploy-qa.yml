name: QA Pipeline

on:
  push:
    branches:
      - qa
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install packages
        run: npm install

      - name: Execute test suite
        run: npm test -- --run --reporter=verbose

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install packages
        run: npm install

      - name: Force reinstall lightningcss
        run: npm install --force lightningcss

      - name: Compile application
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL_QA }}
        run: npm run build

      - name: Validate build output
        run: |
          if [ ! -d "out" ]; then
            echo "Build output directory not found"
            exit 1
          fi
          echo "Build completed successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-build
          path: out/
          retention-days: 1

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    environment: qa

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: qa-build
          path: out/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Initialize infrastructure
        run: |
          rm -f .terraform.lock.hcl
          terraform init -upgrade
        working-directory: deploy/iac-qa

      - name: Format check
        run: terraform fmt -check
        working-directory: deploy/iac-qa
        continue-on-error: true

      - name: Validate configuration
        run: terraform validate
        working-directory: deploy/iac-qa

      - name: Plan changes
        run: terraform plan -out=tfplan
        working-directory: deploy/iac-qa

      - name: Apply infrastructure
        run: terraform apply -auto-approve tfplan
        working-directory: deploy/iac-qa

      - name: Extract S3 bucket
        id: bucket
        run: echo "bucket_name=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
        working-directory: deploy/iac-qa

      - name: Extract CloudFront ID
        id: cloudfront
        run: echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
        working-directory: deploy/iac-qa

      - name: Upload to S3
        run: |
          aws s3 sync out/ s3://${{ steps.bucket.outputs.bucket_name }}/ --delete

      - name: Invalidate cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cloudfront.outputs.distribution_id }} \
            --paths "/*"

      - name: Display website URL
        run: terraform output website_url
        working-directory: deploy/iac-qa
